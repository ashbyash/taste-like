name: On-Demand Cleanup

on:
  workflow_dispatch:

env:
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

jobs:
  cleanup:
    name: Cleanup Unavailable Products
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - name: Run cleanup
        id: cleanup_step
        run: node --import tsx scripts/cleanup.ts
    outputs:
      marked: ${{ steps.cleanup_step.outputs.marked }}
      deleted: ${{ steps.cleanup_step.outputs.deleted }}
      cache_invalidated: ${{ steps.cleanup_step.outputs.cache_invalidated }}
      had_errors: ${{ steps.cleanup_step.outputs.had_errors }}

  notify:
    name: Telegram Notification
    needs: [cleanup]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      CLEANUP_STATUS: ${{ needs.cleanup.result }}
      MARKED: ${{ needs.cleanup.outputs.marked }}
      DELETED: ${{ needs.cleanup.outputs.deleted }}
      CACHE_INVALIDATED: ${{ needs.cleanup.outputs.cache_invalidated }}
      HAD_ERRORS: ${{ needs.cleanup.outputs.had_errors }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - name: Send result to Telegram
        run: |
          if [ "$CLEANUP_STATUS" = "success" ]; then
            EMOJI="✅"
            STATUS="완료"
          else
            EMOJI="❌"
            STATUS="실패"
          fi

          MARKED_VAL="${MARKED:-?}"
          DELETED_VAL="${DELETED:-?}"
          CACHE="${CACHE_INVALIDATED:-unknown}"
          ERRORS="${HAD_ERRORS:-unknown}"

          MSG="${EMOJI} *Cleanup ${STATUS}*

          *Marked unavailable:* ${MARKED_VAL}
          *Deleted:* ${DELETED_VAL}
          *Cache invalidated:* ${CACHE}
          *Errors:* ${ERRORS}"

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg chat_id "$TELEGRAM_CHAT_ID" --arg text "$MSG" '{chat_id: $chat_id, text: $text, parse_mode: "Markdown"}')"
