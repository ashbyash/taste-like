name: Weekly Crawl + Describe + Embed

on:
  schedule:
    # Monday 6AM KST = Sunday 21:00 UTC
    - cron: '0 21 * * 0'
  workflow_dispatch: # Manual trigger

env:
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  # Headful mode required â€” Akamai Bot Manager blocks headless Chromium
  # xvfb provides a virtual display for headful browsers in CI
  HEADLESS: 'false'

jobs:
  api-crawlers:
    name: API Crawlers (Miu Miu, Lemaire, Massimo Dutti, The Row)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      MIUMIU_ALGOLIA_APP_ID: ${{ secrets.MIUMIU_ALGOLIA_APP_ID }}
      MIUMIU_ALGOLIA_API_KEY: ${{ secrets.MIUMIU_ALGOLIA_API_KEY }}
    outputs:
      ok_count: ${{ steps.crawl.outputs.ok_count }}
      total: ${{ steps.crawl.outputs.total }}
      failed_brands: ${{ steps.crawl.outputs.failed_brands }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci

      - name: Crawl API brands
        id: crawl
        run: |
          FAILED=""
          OK=0
          TRIED=0
          for cmd in \
            "node --conditions=react-server --import tsx scripts/crawl.ts miu-miu|miu-miu" \
            "node --conditions=react-server --import tsx scripts/crawl.ts lemaire --both-genders|lemaire" \
            "node --conditions=react-server --import tsx scripts/crawl.ts massimo-dutti --both-genders|massimo-dutti" \
            "node --conditions=react-server --import tsx scripts/crawl.ts the-row --both-genders|the-row"; do
            CMD="${cmd%|*}"; NAME="${cmd##*|}"; TRIED=$((TRIED+1))
            echo "::group::Crawl $NAME"
            if eval "$CMD"; then OK=$((OK+1)); else FAILED="$FAILED $NAME"; fi
            echo "::endgroup::"
          done
          FAILED="${FAILED# }"
          {
            echo "ok_count=$OK"
            echo "total=$TRIED"
            echo "failed_brands=$FAILED"
          } >> "$GITHUB_OUTPUT"
          if [ -n "$FAILED" ]; then
            echo "::warning::Failed brands: $FAILED"
          fi
          if [ "$OK" -eq 0 ] && [ "$TRIED" -gt 0 ]; then
            echo "::error::All API crawlers failed ($TRIED tried)"
            exit 1
          fi

  playwright-crawlers:
    name: Playwright Crawlers (ZARA, COS, ARKET, UNIQLO)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      ok_count: ${{ steps.crawl.outputs.ok_count }}
      total: ${{ steps.crawl.outputs.total }}
      failed_brands: ${{ steps.crawl.outputs.failed_brands }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Crawl Playwright brands
        id: crawl
        run: |
          FAILED=""
          OK=0
          TRIED=0
          for cmd in \
            "xvfb-run node --conditions=react-server --import tsx scripts/crawl.ts zara --both-genders|zara" \
            "xvfb-run node --conditions=react-server --import tsx scripts/crawl.ts cos --both-genders|cos" \
            "xvfb-run node --conditions=react-server --import tsx scripts/crawl.ts arket --both-genders|arket" \
            "xvfb-run node --conditions=react-server --import tsx scripts/crawl.ts uniqlo --both-genders|uniqlo"; do
            CMD="${cmd%|*}"; NAME="${cmd##*|}"; TRIED=$((TRIED+1))
            echo "::group::Crawl $NAME"
            if eval "$CMD"; then OK=$((OK+1)); else FAILED="$FAILED $NAME"; fi
            echo "::endgroup::"
          done
          FAILED="${FAILED# }"
          {
            echo "ok_count=$OK"
            echo "total=$TRIED"
            echo "failed_brands=$FAILED"
          } >> "$GITHUB_OUTPUT"
          if [ -n "$FAILED" ]; then
            echo "::warning::Failed brands: $FAILED"
          fi
          if [ "$OK" -eq 0 ] && [ "$TRIED" -gt 0 ]; then
            echo "::error::All Playwright crawlers failed ($TRIED tried)"
            exit 1
          fi

  ysl-crawler:
    name: YSL Crawler (Saint Laurent)
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci

      - name: Crawl Saint Laurent
        run: node --conditions=react-server --import tsx scripts/crawl.ts saint-laurent --both-genders

  batch-describe:
    name: Generate Fashion Descriptions
    needs: [api-crawlers, playwright-crawlers, ysl-crawler]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      DESCRIBE_TIMEOUT_MS: '15000'
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci

      - name: Generate descriptions for new products
        id: describe_step
        run: node --import tsx scripts/batch-describe.ts
    outputs:
      total: ${{ steps.describe_step.outputs.total }}
      success: ${{ steps.describe_step.outputs.success }}
      failed: ${{ steps.describe_step.outputs.failed }}

  batch-embed:
    name: Generate Embeddings + Invalidate Cache
    needs: [batch-describe]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      HF_SPACE_URL: ${{ secrets.HF_SPACE_URL }}
      HF_SPACE_API_KEY: ${{ secrets.HF_SPACE_API_KEY }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      HF_SPACE_REPO_ID: ${{ secrets.HF_SPACE_REPO_ID }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci

      - name: Generate embeddings for new products
        id: embed_step
        run: node --import tsx scripts/batch-embed.ts
    outputs:
      total: ${{ steps.embed_step.outputs.total }}
      success: ${{ steps.embed_step.outputs.success }}
      failed: ${{ steps.embed_step.outputs.failed }}
      cache_invalidated: ${{ steps.embed_step.outputs.cache_invalidated }}

  notify:
    name: Telegram Notification
    needs: [api-crawlers, playwright-crawlers, ysl-crawler, batch-describe, batch-embed]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      API_RESULT: ${{ needs.api-crawlers.result }}
      API_OK: ${{ needs.api-crawlers.outputs.ok_count }}
      API_TOTAL: ${{ needs.api-crawlers.outputs.total }}
      API_FAILED: ${{ needs.api-crawlers.outputs.failed_brands }}
      PLAYWRIGHT_RESULT: ${{ needs.playwright-crawlers.result }}
      PW_OK: ${{ needs.playwright-crawlers.outputs.ok_count }}
      PW_TOTAL: ${{ needs.playwright-crawlers.outputs.total }}
      PW_FAILED: ${{ needs.playwright-crawlers.outputs.failed_brands }}
      YSL_RESULT: ${{ needs.ysl-crawler.result }}
      DESCRIBE_RESULT: ${{ needs.batch-describe.result }}
      DESCRIBE_TOTAL: ${{ needs.batch-describe.outputs.total }}
      DESCRIBE_SUCCESS: ${{ needs.batch-describe.outputs.success }}
      DESCRIBE_FAILED: ${{ needs.batch-describe.outputs.failed }}
      EMBED_RESULT: ${{ needs.batch-embed.result }}
      EMBED_TOTAL: ${{ needs.batch-embed.outputs.total }}
      EMBED_SUCCESS: ${{ needs.batch-embed.outputs.success }}
      EMBED_FAILED: ${{ needs.batch-embed.outputs.failed }}
      CACHE_INVALIDATED: ${{ needs.batch-embed.outputs.cache_invalidated }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - name: Send weekly summary to Telegram
        run: |
          icon() {
            case "$1" in
              success) echo "âś…" ;;
              failure) echo "âťŚ" ;;
              cancelled) echo "âšŞ" ;;
              skipped) echo "âŹ­" ;;
              *) echo "âť“" ;;
            esac
          }

          API_ICON=$(icon "$API_RESULT")
          PW_ICON=$(icon "$PLAYWRIGHT_RESULT")
          YSL_ICON=$(icon "$YSL_RESULT")
          DESC_ICON=$(icon "$DESCRIBE_RESULT")
          EMB_ICON=$(icon "$EMBED_RESULT")

          if [ "$API_RESULT" = "success" ] && [ "$PLAYWRIGHT_RESULT" = "success" ] \
             && [ "$YSL_RESULT" = "success" ] && [ "$DESCRIBE_RESULT" = "success" ] \
             && [ "$EMBED_RESULT" = "success" ]; then
            HEADER="âś… *Weekly Crawl ě™„ëŁŚ*"
          else
            HEADER="âš ď¸Ź *Weekly Crawl ë¶€ë¶„ ě‹¤íŚ¨*"
          fi

          DESC_T="${DESCRIBE_TOTAL:-?}"
          DESC_S="${DESCRIBE_SUCCESS:-?}"
          DESC_F="${DESCRIBE_FAILED:-?}"
          EMB_T="${EMBED_TOTAL:-?}"
          EMB_S="${EMBED_SUCCESS:-?}"
          EMB_F="${EMBED_FAILED:-?}"
          CACHE="${CACHE_INVALIDATED:-unknown}"

          API_LINE="${API_ICON} API crawlers: ${API_OK:-?}/${API_TOTAL:-?} ok"
          [ -n "$API_FAILED" ] && API_LINE="$API_LINE (failed:$API_FAILED)"
          PW_LINE="${PW_ICON} Playwright crawlers: ${PW_OK:-?}/${PW_TOTAL:-?} ok"
          [ -n "$PW_FAILED" ] && PW_LINE="$PW_LINE (failed:$PW_FAILED)"

          MSG="${HEADER}

          ${API_LINE}
          ${PW_LINE}
          ${YSL_ICON} YSL crawler

          ${DESC_ICON} Describe: ${DESC_T} requested, ${DESC_S} ok, ${DESC_F} failed
          ${EMB_ICON} Embed: ${EMB_T} requested, ${EMB_S} ok, ${EMB_F} failed
          Cache invalidated: ${CACHE}"

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg chat_id "$TELEGRAM_CHAT_ID" --arg text "$MSG" '{chat_id: $chat_id, text: $text, parse_mode: "Markdown"}')"
